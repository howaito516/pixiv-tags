<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pixiv タグ管理ツール</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        th { background: #eee; }
        input, textarea { width: 100%; padding: 6px; }
        button { padding: 6px 12px; }
    </style>
</head>
<body>

<h2>Pixiv タグ管理ツール</h2>

<form id="addForm">
    <label>タグ名：</label>
    <input type="text" name="name" required>

    <label>メモ：</label>
    <textarea name="memo"></textarea>

    <button type="submit">追加</button>
</form>

<table>
    <tr>
        <th>ID</th>
        <th>タグ名</th>
        <th>最終検索日</th>
        <th>メモ</th>
        <th>操作</th>
    </tr>

    {% for tag in tags %}
    <tr>
        <td>{{ tag[0] }}</td>
        <td>{{ tag[1] }}</td>
        <td>{{ tag[2] }}</td>
        <td>
            <textarea id="memo_{{ tag[0] }}">{{ tag[3] }}</textarea>
        </td>
        <td>
            <!-- 🔥 検索ボタン（PC / Android 両対応） -->
            <a href="/search/{{ tag[0] }}" target="_blank">
                <button type="button">検索</button>
            </a>

            <button onclick="updateTag({{ tag[0] }})">更新</button>
            <button onclick="deleteTag({{ tag[0] }})">削除</button>
        </td>
    </tr>
    {% endfor %}
</table>

<script>
document.getElementById("addForm").onsubmit = async function(e) {
    e.preventDefault();
    const formData = new FormData(e.target);
    await fetch("/add", { method: "POST", body: formData });
    location.reload();
};

async function deleteTag(id) {
    await fetch(`/delete/${id}`, { method: "POST" });
    location.reload();
}

async function updateTag(id) {
    const memo = document.getElementById(`memo_${id}`).value;
    const formData = new FormData();
    formData.append("memo", memo);
    await fetch(`/update/${id}`, { method: "POST", body: formData });
    location.reload();
}
</script>

</body>
</html>
