<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pixiv タグ管理ツール（テスト版）</title>
</head>
<body>

<h2>Pixiv タグ管理ツール（テスト版）</h2>

<form method="POST" action="/add">
    <label>タグ名：</label>
    <input type="text" name="name" required>

    <label>メモ：</label>
    <textarea name="memo"></textarea>

    <button type="submit">追加</button>
</form>

<table>
    <tr>
        <th>タグ名</th>
        <th>検索</th>
        <th>最終検索日</th>
    </tr>

    {% for tag in tags %}
    <tr>
        <td>{{ tag[1] }}</td>
        <td><a href="/search/{{ tag[0] }}" target="_blank">検索</a></td>
        <td>{{ tag[3] }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
