<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Pixiv タグ管理ツール</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        h2 { margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #eee; }
        input, textarea { width: 100%; padding: 6px; box-sizing: border-box; }
        button { padding: 6px 12px; margin-right: 5px; }
        a.search-link { padding: 6px 12px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; }
        a.search-link:hover { background: #0056b3; }
    </style>
</head>
<body>

<h2>Pixiv タグ管理ツール</h2>

<!-- タグ追加フォーム -->
<form method="POST" action="/add">
    <label>タグ名：</label>
    <input type="text" name="name" required>

    <label>メモ：</label>
    <textarea name="memo"></textarea>

    <button type="submit">追加</button>
</form>

<!-- CSVインポート & エクスポート -->
<form enctype="multipart/form-data" method="POST" action="/import" style="margin-top: 10px;">
    <label>CSVファイル：</label>
    <input type="file" name="file" accept=".csv" required>
    <button type="submit">CSVインポート</button>
    <a href="/export" style="margin-left:10px;">CSVエクスポート</a>
</form>

<!-- タグ一覧テーブル -->
<table>
    <tr>
        <th>タグ名</th>
        <th>検索</th>
        <th>最終検索日</th>
        <th>編集</th>
        <th>削除</th>
    </tr>

    {% for tag in tags %}
    <tr>
        <td>{{ tag[1] }}</td>

        <!-- PCブラウザ → Web版 / Android → 公式アプリ（Flask側でUA判定） -->
        <td>
            <a href="/search/{{ tag[0] }}" class="search-link" target="_blank">検索</a>
        </td>

        <td>{{ tag[3] }}</td>

        <td>
            <a href="/edit/{{ tag[0] }}">編集</a>
        </td>

        <td>
            <form action="/delete/{{ tag[0] }}" method="post" style="display:inline;">
                <a href="#" onclick="if(confirm('削除しますか？')) this.closest('form').submit(); return false;">削除</a>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
