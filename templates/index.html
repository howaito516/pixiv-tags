<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixiv タグ管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">

    <h1>Pixiv タグ管理</h1>

    <h2>タグ追加</h2>
    <form action="/add" method="post">
        <label>タグ名</label>
        <input name="name" required>

        <label>メモ</label>
        <textarea name="memo" rows="3"></textarea>

        <button type="submit">追加</button>
    </form>

    <hr>

    <form action="/import" method="post" enctype="multipart/form-data" style="display:inline;">
        <input type="file" name="file" required>
        <button type="submit">CSVインポート</button>
    </form>

    <a href="/download" style="margin-left:15px;">CSVダウンロード</a>

    <br><br>

    {% if sort == "asc" %}
        <a href="/?sort=desc">日付の新しい順に並べる</a>
    {% else %}
        <a href="/?sort=asc">日付の古い順に並べる</a>
    {% endif %}

    <form action="/dedupe" method="post" style="display:inline; margin-left:15px;">
        <button type="submit">重複タグを削除</button>
    </form>

    <hr>

    {% for tag in tags %}
    <div class="tag-card">
        <div class="tag-title">{{ tag.name }}</div>
        <div>最終検索: {{ tag.last_search }}</div>

        {% if tag.memo %}
            <div style="margin-top:8px;">メモ: {{ tag.memo }}</div>
        {% endif %}

        <div class="tag-actions">
            <form action="/search/{{ tag.id }}" method="get" style="display:inline;">
                <button type="submit">検索</button>
            </form>

            <a href="/edit/{{ tag.id }}">編集</a>

            <form action="/delete/{{ tag.id }}" method="post" style="display:inline;">
                <button class="delete-btn" onclick="return confirm('削除しますか？');">削除</button>
            </form>
        </div>
    </div>
    {% endfor %}

</div>
</body>
</html>
