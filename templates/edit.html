<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タグ編集</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        h2 { margin-bottom: 10px; }
        label { display: block; margin-top: 10px; }
        textarea { width: 100%; height: 120px; padding: 6px; box-sizing: border-box; }
        button { padding: 6px 12px; margin-top: 10px; }
        a { margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

<h2>タグ編集</h2>

<p><strong>タグ名：</strong> {{ tag[1] }}</p>
<p><strong>最終検索日：</strong> {{ tag[3] }}</p>

<form method="POST" action="/update/{{ tag[0] }}">
    <label>メモ：</label>
    <textarea name="memo">{{ tag[2] }}</textarea>

    <button type="submit">更新</button>
</form>

<a href="/">← タグ一覧に戻る</a>

</body>
</html>
